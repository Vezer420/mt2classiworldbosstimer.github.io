<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Interactive Map</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>

<style>
html, body {
  margin:0;
  height:100%;
}

#map {
  width:100%;
  height:100vh;
  background:black;
}
</style>

</head>

<body>

<div id="map"></div>

<script>
var viewer = OpenSeadragon({
    id: "map",
    prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
    tileSources: {
        type: 'image',
        url: 'map.png'
    },
    showNavigator: true,
    zoomPerScroll: 1.2
});
</script>

</body>
</html>
